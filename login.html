<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Plataforma de Vídeos</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      min-height:100vh;
      background:linear-gradient(180deg,#020817 0%, #071224 100%);
      color:#e5e7eb;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .login-box{
      width:100%;
      max-width:420px;
      background:#0f172a;
      border:1px solid #1e293b;
      border-radius:20px;
      padding:28px;
      box-shadow:0 20px 50px rgba(0,0,0,.45);
    }

    h1{
      font-size:30px;
      margin-bottom:8px;
      color:#fff;
      text-align:center;
    }

    .sub{
      text-align:center;
      color:#94a3b8;
      margin-bottom:24px;
      font-size:14px;
    }

    .campo{
      margin-bottom:16px;
    }

    .campo label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      color:#cbd5e1;
      font-weight:700;
    }

    .campo input{
      width:100%;
      padding:14px 14px;
      border-radius:12px;
      border:1px solid #334155;
      background:#020617;
      color:#fff;
      outline:none;
      font-size:15px;
    }

.campo input:-webkit-autofill,
.campo input:-webkit-autofill:hover,
.campo input:-webkit-autofill:focus,
.campo input:-webkit-autofill:active{
  -webkit-box-shadow: 0 0 0 1000px #020617 inset !important;
  -webkit-text-fill-color: #ffffff !important;
  caret-color: #ffffff !important;
  border: 1px solid #334155 !important;
}

    button{
      width:100%;
      border:none;
      border-radius:12px;
      padding:14px 16px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      color:#fff;
      transition:transform .2s ease, opacity .2s ease;
    }

    button:hover{
      transform:translateY(-1px);
      opacity:.97;
    }

    .msg{
      margin-top:14px;
      text-align:center;
      font-size:14px;
      color:#93c5fd;
      min-height:20px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h1>Entrar</h1>
    <p class="sub">Acesse sua plataforma</p>

    <div class="campo">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="Digite seu e-mail" />
    </div>

    <div class="campo">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha" />
    </div>

    <button id="btnLogin">Entrar</button>
    <p id="msg" class="msg"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wpgmlaftkosunysjozqj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_oSoYCmoXNFkisbRTJNs3GA_NXBsJAXD";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    storage: window.sessionStorage,
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true
  }
});

    const email = document.getElementById("email");
    const senha = document.getElementById("senha");
    const btnLogin = document.getElementById("btnLogin");
    const msg = document.getElementById("msg");

    async function verificarSessao() {
      const { data, error } = await supabaseClient.auth.getSession();

      if (!error && data.session) {
        window.location.href = "index.html";
      }
    }

    btnLogin.addEventListener("click", async function () {
      const emailValor = email.value.trim();
      const senhaValor = senha.value.trim();

      if (!emailValor) {
        msg.textContent = "Informe seu e-mail.";
        return;
      }

      if (!senhaValor) {
        msg.textContent = "Informe sua senha.";
        return;
      }

      msg.textContent = "Entrando...";

      const { error } = await supabaseClient.auth.signInWithPassword({
        email: emailValor,
        password: senhaValor
      });

      if (error) {
        msg.textContent = "Login inválido: " + error.message;
        return;
      }

      msg.textContent = "Login realizado com sucesso.";
      window.location.href = "index.html";
    });

    verificarSessao();
  </script>
</body>
</html>
