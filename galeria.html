<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria de Fotos</title>

  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }
    html, body{ height:100%; }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#0f172a;
      color:#e5e7eb;
      margin:0;
    }

    .topo{
      background:linear-gradient(135deg, #1d4ed8, #1e3a8a);
      padding:20px 20px;
      text-align:center;
      box-shadow:0 4px 20px rgba(0,0,0,0.25);
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
    }

    .topo h1{
      font-size:30px;
      margin-bottom:0;
    }

    .btn-fullscreen{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      width:44px;
      height:44px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.25);
      background:rgba(255,255,255,0.08);
      color:#ffffff;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:0.2s ease;
      padding:0;
      font-size:24px;
      font-weight:700;
    }

    .btn-fullscreen:hover{
      background:rgba(255,255,255,0.18);
      transform:translateY(-50%) scale(1.04);
    }

    .container{
      max-width:1400px;
      margin:100px auto 0;
      padding:0 16px 24px;
    }

    .card{
      background:#111827;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
      min-height:0;
      margin-bottom:18px;
    }

    .top-actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .top-actions h2{
      font-size:34px;
    }

    .acoes-topo{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn-link{
      display:inline-block;
      text-decoration:none;
      background:#2563eb;
      color:#ffffff;
      padding:12px 16px;
      border-radius:12px;
      font-weight:700;
      transition:0.2s ease;
    }

    .btn-link:hover{
      transform:translateY(-1px);
      opacity:0.95;
    }

    .subtexto{
      color:#94a3b8;
      margin-bottom:18px;
      line-height:1.5;
    }

    .grid1{
      display:grid;
      gap:12px;
      margin-bottom:16px;
    }

    input, textarea{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #334155;
      background:#0b1220;
      color:#ffffff;
      outline:none;
      font-size:15px;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .acoes{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-weight:700;
      transition:0.2s;
      background:#2563eb;
      color:#ffffff;
    }

    button:hover{
      transform:translateY(-1px);
      opacity:0.95;
    }

    .msg{
      margin-top:14px;
      color:#93c5fd;
      word-break:break-word;
    }

    .galeria-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:18px;
    }

    .foto-card{
      background:#08101d;
      border:1px solid #243244;
      border-radius:16px;
      overflow:hidden;
      transition:transform 0.2s ease, box-shadow 0.2s ease;
      display:flex;
      flex-direction:column;
    }

    .foto-card:hover{
      transform:translateY(-4px);
      box-shadow:0 14px 30px rgba(0,0,0,0.25);
    }

    .foto-wrap{
      width:100%;
      height:275px;
      background:#020617;
      overflow:hidden;
      cursor:pointer;
      position:relative;
    }

    .foto-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transition:transform 0.35s ease;
      background:#020617;
    }

    .foto-card:hover .foto-wrap img{
      transform:scale(1.04);
    }

    .foto-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,0.35), rgba(0,0,0,0.05));
      display:flex;
      align-items:flex-end;
      justify-content:flex-end;
      padding:12px;
      pointer-events:none;
    }

    .tag-ampliar{
      background:rgba(37,99,235,0.92);
      color:#fff;
      font-size:12px;
      font-weight:700;
      padding:8px 10px;
      border-radius:999px;
    }

    .foto-info{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .foto-info h3{
      font-size:20px;
      color:#ffffff;
      line-height:1.3;
    }

    .foto-info p{
      color:#cbd5e1;
      font-size:14px;
      line-height:1.5;
    }

    .btn-excluir-foto{
      background:#dc2626;
      margin-top:6px;
      width:max-content;
    }

    .vazio{
      color:#94a3b8;
      text-align:center;
      padding:30px 10px;
      font-size:15px;
    }

    .modal-foto{
      position:fixed;
      inset:0;
      background:rgba(2, 6, 23, 0.90);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:99999;
      padding:20px;
    }

    .modal-foto.ativo{
      display:flex;
    }

    .modal-conteudo{
      width:100%;
      max-width:1100px;
      max-height:90vh;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 70px;
    }

    .modal-conteudo img{
      max-width:100%;
      max-height:90vh;
      border-radius:18px;
      border:1px solid #29406b;
      box-shadow:0 20px 50px rgba(0,0,0,0.45);
      background:#000;
    }

    .btn-fechar-modal{
      position:absolute;
      top:-10px;
      right:-10px;
      width:42px;
      height:42px;
      border:none;
      border-radius:999px;
      background:#dc2626;
      color:#fff;
      font-size:20px;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 10px 20px rgba(0,0,0,0.3);
      z-index:3;
      padding:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .btn-nav-modal{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:52px;
      height:52px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.20);
      background:rgba(15,23,42,0.82);
      color:#ffffff;
      font-size:30px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      z-index:2;
      padding:0;
      box-shadow:0 10px 25px rgba(0,0,0,0.35);
      backdrop-filter:blur(4px);
    }

    .btn-nav-modal:hover{
      background:rgba(37,99,235,0.92);
      transform:translateY(-50%) scale(1.05);
      opacity:1;
    }

    .btn-nav-modal.esquerda{
      left:6px;
    }

    .btn-nav-modal.direita{
      right:6px;
    }

    #areaAdminFotos{
      display:none;
    }

    @media (max-width: 1200px){
      .galeria-grid{ grid-template-columns:repeat(3, 1fr); }
    }

    @media (max-width: 900px){
      .galeria-grid{ grid-template-columns:repeat(2, 1fr); }
      .top-actions h2{ font-size:28px; }
    }

    @media (max-width: 600px){
      .galeria-grid{ grid-template-columns:1fr; }
      .topo h1{ font-size:24px; }
      .top-actions h2{ font-size:24px; }
      .btn-fullscreen{
        width:40px;
        height:40px;
        right:12px;
        font-size:22px;
      }
      .foto-wrap{ height:230px; }

      .modal-conteudo{
        padding:0 48px;
      }

      .btn-nav-modal{
        width:44px;
        height:44px;
        font-size:26px;
      }

      .btn-nav-modal.esquerda{
        left:0;
      }

      .btn-nav-modal.direita{
        right:0;
      }
    }
  </style>
</head>
<body>

  <header class="topo">
    <h1>Galeria de Fotos</h1>
    <button class="btn-fullscreen" id="btnFullscreen" title="Tela cheia" aria-label="Tela cheia">⛶</button>
  </header>

  <main class="container">
    <section class="card" id="areaAdminFotos">
      <h2>Adicionar Foto</h2>

      <div class="grid1">
        <input type="text" id="tituloFoto" placeholder="Título da foto" />
        <textarea id="descricaoFoto" placeholder="Descrição da foto"></textarea>
        <input type="file" id="arquivoFoto" accept=".png,.jpg,.jpeg,image/png,image/jpeg" />
      </div>

      <div class="acoes">
        <button id="btnUploadFoto" type="button">Adicionar foto</button>
      </div>

      <p id="uploadFotoMsg" class="msg"></p>
    </section>

    <section class="card">
      <div class="top-actions">
        <h2>Fotos</h2>

        <div class="acoes-topo">
          <a href="index.html" class="btn-link">Voltar para vídeos</a>
          <a href="chat.html" class="btn-link">Ir para o chat</a>
        </div>
      </div>

      <p class="subtexto">
        Clique em qualquer foto para ampliar.
      </p>

      <div id="galeriaGrid" class="galeria-grid"></div>
    </section>
  </main>

  <div class="modal-foto" id="modalFoto">
    <div class="modal-conteudo">
      <button class="btn-nav-modal esquerda" id="btnFotoAnterior" type="button" aria-label="Foto anterior">‹</button>
      <button class="btn-nav-modal direita" id="btnFotoProxima" type="button" aria-label="Próxima foto">›</button>
      <button class="btn-fechar-modal" id="btnFecharModal" type="button">×</button>
      <img id="imgModal" src="" alt="Foto ampliada" />
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wpgmlaftkosunysjozqj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_oSoYCmoXNFkisbRTJNs3GA_NXBsJAXD";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        storage: window.sessionStorage,
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const EMAIL_ADMIN = "adriano_freitas1980@outlook.com";
    let usuarioAdmin = false;
    let fotosCache = [];
    let fotoAtualIndex = -1;

    const btnFullscreen = document.getElementById("btnFullscreen");
    const galeriaGrid = document.getElementById("galeriaGrid");
    const modalFoto = document.getElementById("modalFoto");
    const imgModal = document.getElementById("imgModal");
    const btnFecharModal = document.getElementById("btnFecharModal");
    const btnFotoAnterior = document.getElementById("btnFotoAnterior");
    const btnFotoProxima = document.getElementById("btnFotoProxima");

    const areaAdminFotos = document.getElementById("areaAdminFotos");
    const tituloFoto = document.getElementById("tituloFoto");
    const descricaoFoto = document.getElementById("descricaoFoto");
    const arquivoFoto = document.getElementById("arquivoFoto");
    const btnUploadFoto = document.getElementById("btnUploadFoto");
    const uploadFotoMsg = document.getElementById("uploadFotoMsg");

    function aplicarControleAdmin() {
      if (!areaAdminFotos) return;
      areaAdminFotos.style.display = usuarioAdmin ? "block" : "none";
    }

    async function verificarAdmin() {
      let tentativa = 0;
      let user = null;

      while (!user && tentativa < 5) {
        const { data } = await supabaseClient.auth.getUser();
        user = data.user;
        if (!user) {
          await new Promise(r => setTimeout(r, 300));
        }
        tentativa++;
      }

      if (user && user.email) {
        const emailLogado = String(user.email).trim().toLowerCase();
        usuarioAdmin = emailLogado === EMAIL_ADMIN.toLowerCase();
      } else {
        usuarioAdmin = false;
      }

      aplicarControleAdmin();
    }

    function alternarTelaCheia() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(function(err) {
          alert("Não foi possível ativar tela cheia.");
          console.error(err);
        });
      } else {
        document.exitFullscreen();
      }
    }

    function atualizarVisibilidadeSetas() {
      const mostrar = modalFoto.classList.contains("ativo") && fotosCache.length > 1 && fotoAtualIndex >= 0;
      btnFotoAnterior.style.display = mostrar ? "flex" : "none";
      btnFotoProxima.style.display = mostrar ? "flex" : "none";
    }

    function mostrarFotoAtualNoModal() {
      if (fotoAtualIndex < 0 || fotoAtualIndex >= fotosCache.length) return;

      const foto = fotosCache[fotoAtualIndex];
      imgModal.src = foto._urlImagem || "";
      imgModal.alt = foto.titulo || ("Foto " + (fotoAtualIndex + 1));
      atualizarVisibilidadeSetas();
    }

    function abrirModalPorIndice(index) {
      if (!fotosCache.length) return;

      if (index < 0) index = fotosCache.length - 1;
      if (index >= fotosCache.length) index = 0;

      fotoAtualIndex = index;
      mostrarFotoAtualNoModal();
      modalFoto.classList.add("ativo");
      atualizarVisibilidadeSetas();
    }

    function navegarFotos(direcao) {
      if (!modalFoto.classList.contains("ativo")) return;
      if (!fotosCache.length) return;
      abrirModalPorIndice(fotoAtualIndex + direcao);
    }

    function abrirModal(src, alt) {
      const idx = fotosCache.findIndex(function(f) {
        return String(f._urlImagem || "") === String(src || "");
      });

      if (idx >= 0) {
        abrirModalPorIndice(idx);
        return;
      }

      fotoAtualIndex = -1;
      imgModal.src = src;
      imgModal.alt = alt || "Foto ampliada";
      modalFoto.classList.add("ativo");
      atualizarVisibilidadeSetas();
    }

    function fecharModal() {
      modalFoto.classList.remove("ativo");
      imgModal.src = "";
      imgModal.alt = "Foto ampliada";
      fotoAtualIndex = -1;
      atualizarVisibilidadeSetas();
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text == null ? "" : String(text);
      return div.innerHTML;
    }

    function escapeJs(text) {
      return String(text == null ? "" : text)
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'");
    }

    function montarUrlFoto(foto) {
      const caminho = (foto && foto.caminho_arquivo) ? String(foto.caminho_arquivo) : "";
      if (caminho) {
        const pub = supabaseClient.storage.from("galeria").getPublicUrl(caminho);
        const base = pub && pub.data ? pub.data.publicUrl : "";
        if (base) {
          const stamp = encodeURIComponent(foto.criado_em || foto.id || Date.now());
          return base + "?v=" + stamp;
        }
      }

      const urlSalva = foto && foto.url_foto ? String(foto.url_foto) : "";
      return urlSalva;
    }

    btnFullscreen.addEventListener("click", alternarTelaCheia);
    btnFecharModal.addEventListener("click", fecharModal);
    btnFotoAnterior.addEventListener("click", function() {
      navegarFotos(-1);
    });
    btnFotoProxima.addEventListener("click", function() {
      navegarFotos(1);
    });

    modalFoto.addEventListener("click", function(e) {
      if (e.target === modalFoto) fecharModal();
    });

    document.addEventListener("keydown", function(e) {
      if (!modalFoto.classList.contains("ativo")) return;

      if (e.key === "Escape") {
        fecharModal();
      } else if (e.key === "ArrowLeft") {
        navegarFotos(-1);
      } else if (e.key === "ArrowRight") {
        navegarFotos(1);
      }
    });

    btnUploadFoto.addEventListener("click", async function () {
      if (!usuarioAdmin) {
        uploadFotoMsg.textContent = "Apenas o administrador pode adicionar fotos.";
        return;
      }

      const titulo = tituloFoto.value.trim();
      const descricao = descricaoFoto.value.trim();
      const file = arquivoFoto.files[0];

      if (!titulo) {
        uploadFotoMsg.textContent = "Informe o título da foto.";
        return;
      }

      if (!file) {
        uploadFotoMsg.textContent = "Selecione uma foto.";
        return;
      }

      const tipoPermitido = ["image/png", "image/jpeg", "image/jpg"];
      if (!tipoPermitido.includes((file.type || "").toLowerCase())) {
        uploadFotoMsg.textContent = "Envie apenas imagens PNG, JPG ou JPEG.";
        return;
      }

      try {
        uploadFotoMsg.textContent = "Enviando foto...";

        const extensao = file.name.includes(".") ? file.name.split(".").pop().toLowerCase() : "jpg";
        const nomeArquivo = Date.now() + "-" + Math.random().toString(36).slice(2) + "." + extensao;
        const caminhoArquivo = nomeArquivo;

        const { error: uploadError } = await supabaseClient.storage
          .from("galeria")
          .upload(caminhoArquivo, file, {
            cacheControl: "3600",
            upsert: false,
            contentType: file.type || "image/jpeg"
          });

        if (uploadError) throw uploadError;

        const { data: publicUrlData } = supabaseClient.storage
          .from("galeria")
          .getPublicUrl(caminhoArquivo);

        const urlFoto = publicUrlData.publicUrl;

        const { error: insertError } = await supabaseClient
          .from("fotos_galeria")
          .insert([
            {
              titulo: titulo,
              descricao: descricao || "Sem descrição",
              url_foto: urlFoto,
              caminho_arquivo: caminhoArquivo
            }
          ]);

        if (insertError) throw insertError;

        tituloFoto.value = "";
        descricaoFoto.value = "";
        arquivoFoto.value = "";
        uploadFotoMsg.textContent = "Foto enviada e salva com sucesso.";

        await carregarFotos();
      } catch (erro) {
        console.error(erro);
        uploadFotoMsg.textContent = "Erro ao enviar: " + erro.message;
      }
    });

    async function carregarFotos() {
      galeriaGrid.innerHTML = '<div class="vazio">Carregando fotos...</div>';
      fotosCache = [];
      atualizarVisibilidadeSetas();

      const { data, error } = await supabaseClient
        .from("fotos_galeria")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        console.error(error);
        galeriaGrid.innerHTML = '<div class="vazio">Erro ao carregar fotos.</div>';
        return;
      }

      if (!data || data.length === 0) {
        galeriaGrid.innerHTML = '<div class="vazio">Nenhuma foto cadastrada ainda.</div>';
        return;
      }

      fotosCache = data.map(function(foto) {
        return {
          ...foto,
          _urlImagem: montarUrlFoto(foto)
        };
      });

      let html = "";

      fotosCache.forEach(function(foto, index) {
        const urlImagem = foto._urlImagem;
        const botaoExcluir = usuarioAdmin
          ? `<button class="btn-excluir-foto" type="button" onclick="excluirFoto(${foto.id}, '${escapeJs(foto.caminho_arquivo || "")}')">Excluir foto</button>`
          : "";

        html += `
          <div class="foto-card">
            <div class="foto-wrap" onclick="abrirModalPorIndice(${index})">
              <img
                src="${escapeHtml(urlImagem)}"
                alt="${escapeHtml(foto.titulo || ("Foto " + (index + 1)))}"
              />
              <div class="foto-overlay">
                <span class="tag-ampliar">Ampliar</span>
              </div>
            </div>

            <div class="foto-info">
              <h3>${escapeHtml(foto.titulo || ("Foto " + (index + 1)))}</h3>
              <p>${escapeHtml(foto.descricao || "Sem descrição.")}</p>
              ${botaoExcluir}
            </div>
          </div>
        `;
      });

      galeriaGrid.innerHTML = html;
    }

    async function excluirFoto(id, caminhoArquivo) {
      if (!usuarioAdmin) {
        alert("Apenas o administrador pode excluir fotos.");
        return;
      }

      const confirmar = window.confirm("Deseja realmente excluir esta foto?");
      if (!confirmar) return;

      try {
        if (caminhoArquivo) {
          const { error: storageError } = await supabaseClient.storage
            .from("galeria")
            .remove([caminhoArquivo]);

          if (storageError) throw storageError;
        }

        const { error: deleteError } = await supabaseClient
          .from("fotos_galeria")
          .delete()
          .eq("id", id);

        if (deleteError) throw deleteError;

        await carregarFotos();
      } catch (erro) {
        console.error(erro);
        alert("Erro ao excluir: " + erro.message);
      }
    }

    window.abrirModal = abrirModal;
    window.abrirModalPorIndice = abrirModalPorIndice;
    window.excluirFoto = excluirFoto;

    (async function iniciarPagina() {
      await verificarAdmin();
      await carregarFotos();
    })();
  </script>
</body>
</html>
