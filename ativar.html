<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ativar acesso | Plataforma de Vídeos</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      min-height:100vh;
      background:linear-gradient(180deg,#020817 0%, #071224 100%);
      color:#e5e7eb;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .box{
      width:100%;
      max-width:460px;
      background:#0f172a;
      border:1px solid #1e293b;
      border-radius:20px;
      padding:28px;
      box-shadow:0 20px 50px rgba(0,0,0,.45);
    }

    h1{
      font-size:30px;
      margin-bottom:8px;
      color:#fff;
      text-align:center;
    }

    .sub{
      text-align:center;
      color:#94a3b8;
      margin-bottom:24px;
      font-size:14px;
      line-height:1.5;
    }

    .campo{
      margin-bottom:16px;
    }

    .campo label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      color:#cbd5e1;
      font-weight:700;
    }

    .campo input{
      width:100%;
      padding:14px 14px;
      border-radius:12px;
      border:1px solid #334155;
      background:#020617;
      color:#fff;
      outline:none;
      font-size:15px;
    }

    .campo input:-webkit-autofill,
    .campo input:-webkit-autofill:hover,
    .campo input:-webkit-autofill:focus,
    .campo input:-webkit-autofill:active{
      -webkit-box-shadow: 0 0 0 1000px #020617 inset !important;
      -webkit-text-fill-color: #ffffff !important;
      caret-color: #ffffff !important;
      border: 1px solid #334155 !important;
    }

    button{
      width:100%;
      border:none;
      border-radius:12px;
      padding:14px 16px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      color:#fff;
      transition:transform .2s ease, opacity .2s ease;
    }

    button:hover{
      transform:translateY(-1px);
      opacity:.97;
    }

    button:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none;
    }

    .msg{
      margin-top:14px;
      text-align:center;
      font-size:14px;
      min-height:22px;
      line-height:1.5;
      word-break:break-word;
    }

    .msg.info{ color:#93c5fd; }
    .msg.ok{ color:#86efac; }
    .msg.erro{ color:#fca5a5; }

    .bloco-cadastro{
      display:none;
      margin-top:12px;
    }

    .rodape{
      margin-top:20px;
      text-align:center;
      font-size:13px;
      color:#94a3b8;
      line-height:1.5;
    }

    .rodape a{
      color:#93c5fd;
      text-decoration:none;
      font-weight:700;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Ativar acesso</h1>
    <p class="sub">
      Use este link para cadastrar seu e-mail e sua senha e liberar sua entrada na plataforma.
    </p>

    <p id="msg" class="msg info">Validando seu link...</p>

    <div id="blocoCadastro" class="bloco-cadastro">
      <div class="campo">
        <label for="emailCadastro">Cadastre seu e-mail</label>
        <input type="email" id="emailCadastro" placeholder="Digite seu e-mail" />
      </div>

      <div class="campo">
        <label for="senhaCadastro">Cadastre sua senha</label>
        <input type="password" id="senhaCadastro" placeholder="Digite sua senha" />
      </div>

      <div class="campo">
        <label for="confirmarSenhaCadastro">Confirme sua senha</label>
        <input type="password" id="confirmarSenhaCadastro" placeholder="Repita sua senha" />
      </div>

      <button id="btnCadastrar">Ativar acesso</button>
    </div>

    <div class="rodape">
      Já tem acesso? <a href="login.html">Ir para o login</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wpgmlaftkosunysjozqj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_oSoYCmoXNFkisbRTJNs3GA_NXBsJAXD";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        storage: window.sessionStorage,
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const params = new URLSearchParams(window.location.search);
    const token = (params.get("token") || "").trim();

    const blocoCadastro = document.getElementById("blocoCadastro");
    const emailCadastro = document.getElementById("emailCadastro");
    const senhaCadastro = document.getElementById("senhaCadastro");
    const confirmarSenhaCadastro = document.getElementById("confirmarSenhaCadastro");
    const btnCadastrar = document.getElementById("btnCadastrar");
    const msg = document.getElementById("msg");

    let conviteAtual = null;
    let processando = false;

    function definirMensagem(texto, tipo) {
      msg.textContent = texto;
      msg.className = "msg " + (tipo || "info");
    }

    function irParaLogin() {
      window.location.href = "login.html";
    }

    async function validarToken() {
      if (!token) {
        definirMensagem("Link inválido. Token não encontrado.", "erro");
        return;
      }

      try {
        const { data, error } = await supabaseClient
          .from("convites_ativacao")
          .select("id, email_comprador, usado, expira_em")
          .eq("token", token)
          .maybeSingle();

        if (error) {
          console.error(error);
          definirMensagem("Não foi possível validar o link: " + error.message, "erro");
          return;
        }

        if (!data) {
          definirMensagem("Este link não existe ou é inválido.", "erro");
          return;
        }

        if (data.usado) {
          definirMensagem("Este link já foi utilizado.", "erro");
          return;
        }

        if (data.expira_em) {
          const agora = new Date().getTime();
          const expira = new Date(data.expira_em).getTime();

          if (!isNaN(expira) && expira < agora) {
            definirMensagem("Este link expirou. Solicite um novo acesso.", "erro");
            return;
          }
        }

        conviteAtual = data;
        emailCadastro.value = data.email_comprador || "";
        blocoCadastro.style.display = "block";
        definirMensagem("Link validado. Agora cadastre seu e-mail e sua senha.", "ok");
      } catch (erro) {
        console.error(erro);
        definirMensagem("Erro ao validar o link: " + erro.message, "erro");
      }
    }

    async function cadastrarConta() {
      if (processando) return;

      if (!conviteAtual) {
        definirMensagem("Convite não validado.", "erro");
        return;
      }

      const email = emailCadastro.value.trim().toLowerCase();
      const senha = senhaCadastro.value.trim();
      const confirmarSenha = confirmarSenhaCadastro.value.trim();

      if (!email) {
        definirMensagem("Digite seu e-mail.", "erro");
        return;
      }

      const emailValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailValido.test(email)) {
        definirMensagem("Digite um e-mail válido.", "erro");
        return;
      }

      if (!senha) {
        definirMensagem("Digite uma senha.", "erro");
        return;
      }

      if (senha.length < 6) {
        definirMensagem("A senha deve ter pelo menos 6 caracteres.", "erro");
        return;
      }

      if (!confirmarSenha) {
        definirMensagem("Confirme sua senha.", "erro");
        return;
      }

      if (senha !== confirmarSenha) {
        definirMensagem("As senhas não conferem.", "erro");
        return;
      }

      processando = true;
      btnCadastrar.disabled = true;
      definirMensagem("Criando seu acesso...", "info");

      try {
        const { data, error } = await supabaseClient.auth.signUp({
          email: email,
          password: senha
        });

        if (error) {
          throw error;
        }

        const userId = data && data.user ? data.user.id : null;

        const { data: conviteAtualizado, error: updateError } = await supabaseClient
          .from("convites_ativacao")
          .update({
            email_comprador: email,
            usado: true,
            usado_em: new Date().toISOString(),
            user_id: userId
          })
          .eq("id", conviteAtual.id)
          .eq("usado", false)
          .select("id")
          .maybeSingle();

        if (updateError) {
          throw updateError;
        }

        if (!conviteAtualizado) {
          throw new Error("Este link já foi utilizado.");
        }

        try {
          await supabaseClient.auth.signOut();
        } catch (erroSaida) {
          console.error(erroSaida);
        }

        definirMensagem("Conta criada com sucesso. Redirecionando para o login...", "ok");
        setTimeout(irParaLogin, 2200);
      } catch (erro) {
        console.error(erro);
        definirMensagem("Erro ao ativar acesso: " + erro.message, "erro");
      } finally {
        processando = false;
        btnCadastrar.disabled = false;
      }
    }

    btnCadastrar.addEventListener("click", cadastrarConta);

    confirmarSenhaCadastro.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        cadastrarConta();
      }
    });

    senhaCadastro.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        cadastrarConta();
      }
    });

    emailCadastro.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        cadastrarConta();
      }
    });

    validarToken();
  </script>
</body>
</html>
