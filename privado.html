<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Privado</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body{
      height:100%;
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#0f172a;
      color:#e5e7eb;
      min-height:100vh;
    }

    .topo{
      background:linear-gradient(135deg,#1d4ed8,#1e3a8a);
      padding:20px;
      text-align:center;
      position:sticky;
      top:0;
      z-index:1000;
    }

.btn-fullscreen{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.08);
  color:#ffffff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.2s ease;
  padding:0;
  font-size:24px;
  font-weight:700;
}

.btn-fullscreen:hover{
  background:rgba(255,255,255,0.18);
  transform:translateY(-50%) scale(1.04);
}

    .wrap{
      max-width:1100px;
      margin:20px auto;
      padding:0 16px 20px;
    }

    .card{
      background:#111827;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }

    .top-info{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .top-info h2{
      font-size:28px;
    }

    .btn-voltar{
      text-decoration:none;
      background:#2563eb;
      color:#fff;
      padding:12px 16px;
      border-radius:12px;
      font-weight:700;
      display:inline-block;
    }

    .status{
      background:#08101d;
      border:1px solid #243244;
      border-radius:14px;
      padding:16px;
      margin-bottom:16px;
      line-height:1.6;
      color:#cbd5e1;
    }

    .status strong{
      color:#fff;
    }

    .chat-box{
      background:#08101d;
      border:1px solid #243244;
      border-radius:14px;
      min-height:360px;
      max-height:460px;
      overflow-y:auto;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-bottom:16px;
    }

    .msg-item{
      max-width:75%;
      padding:14px;
      border-radius:14px;
      border:1px solid #243244;
      line-height:1.5;
      word-break:break-word;
    }

    .msg-item.eu{
      align-self:flex-end;
      background:#1d4ed8;
      border-color:#1d4ed8;
      color:#fff;
    }

    .msg-item.outro{
      align-self:flex-start;
      background:#111827;
      color:#e5e7eb;
    }

    .msg-topo{
      font-size:12px;
      font-weight:700;
      opacity:.9;
      margin-bottom:6px;
      text-transform:uppercase;
    }

    .msg-texto{
      font-size:15px;
      white-space:pre-wrap;
    }

    .msg-data{
      font-size:11px;
      opacity:.8;
      margin-top:8px;
    }

    .vazio{
      text-align:center;
      color:#93c5fd;
      padding:40px 10px;
    }

    .linha-form{
      display:grid;
      gap:10px;
    }

    textarea{
      width:100%;
      min-height:90px;
      resize:none;
      padding:14px;
      border-radius:12px;
      border:1px solid #334155;
      background:#0b1220;
      color:#fff;
      outline:none;
      font-size:15px;
    }

    textarea:-webkit-autofill,
    textarea:-webkit-autofill:hover,
    textarea:-webkit-autofill:focus,
    textarea:-webkit-autofill:active{
      -webkit-box-shadow: 0 0 0 1000px #0b1220 inset !important;
      -webkit-text-fill-color: #ffffff !important;
      caret-color: #ffffff !important;
      border: 1px solid #334155 !important;
    }

    button{
      border:none;
      border-radius:12px;
      padding:14px 18px;
      cursor:pointer;
      font-weight:700;
      transition:.2s;
      background:#2563eb;
      color:#fff;
    }

    button:hover{
      transform:translateY(-1px);
      opacity:.95;
    }

    .msg{
      margin-top:10px;
      color:#93c5fd;
    }

    @media (max-width:700px){
      .msg-item{
        max-width:90%;
      }

      .top-info h2{
        font-size:24px;
      }
    }
  </style>
</head>
<body>
<header class="topo">
  <h1>Chat Privado</h1>
  <button class="btn-fullscreen" id="btnFullscreen" title="Tela cheia" aria-label="Tela cheia">⛶</button>
</header>

  <main class="wrap">
    <section class="card">
      <div class="top-info">
        <h2>Conversa reservada</h2>
        <a href="chat.html" class="btn-voltar">Voltar para comunidade</a>
      </div>

      <div class="status" id="statusPrivado"></div>

      <div class="chat-box" id="chatPrivadoMensagens">
        <div class="vazio">Carregando conversa privada...</div>
      </div>

      <div class="linha-form">
        <textarea id="textoPrivado" placeholder="Digite sua mensagem privada"></textarea>
        <button id="btnEnviarPrivado">Enviar mensagem privada</button>
      </div>

      <p class="msg" id="msgPrivado"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wpgmlaftkosunysjozqj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_oSoYCmoXNFkisbRTJNs3GA_NXBsJAXD";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        storage: window.sessionStorage,
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const btnFullscreen = document.getElementById("btnFullscreen");
    const statusPrivado = document.getElementById("statusPrivado");
    const chatPrivadoMensagens = document.getElementById("chatPrivadoMensagens");
    const textoPrivado = document.getElementById("textoPrivado");
    const btnEnviarPrivado = document.getElementById("btnEnviarPrivado");
    const msgPrivado = document.getElementById("msgPrivado");

    const params = new URLSearchParams(window.location.search);
    const de = (params.get("de") || "").trim();
    const para = (params.get("para") || "").trim();
    const atualParam = (params.get("atual") || "").trim();

    function escapeHtml(texto) {
      const div = document.createElement("div");
      div.textContent = texto;
      return div.innerHTML;
    }

    function formatarData(dataIso) {
      if (!dataIso) return "";
      return new Date(dataIso).toLocaleString("pt-BR");
    }

    function gerarSalaId(nome1, nome2) {
      return [nome1.trim().toUpperCase(), nome2.trim().toUpperCase()].sort().join("__");
    }

    const salaId = gerarSalaId(de, para);

    function normalizarAtual() {
      if (atualParam) return atualParam;

      const referencia = sessionStorage.getItem("chat_nome_privado");
      if (referencia) return referencia;

      return de;
    }

    const usuarioAtual = normalizarAtual();
    const outroUsuario = usuarioAtual.toUpperCase() === de.toUpperCase() ? para : de;

    sessionStorage.setItem("chat_nome_privado", usuarioAtual);

    function alternarTelaCheia() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(function(err) {
      alert("Não foi possível ativar tela cheia.");
      console.error(err);
    });
  } else {
    document.exitFullscreen();
  }
}

btnFullscreen.addEventListener("click", alternarTelaCheia);

    async function verificarSessao() {
      const { data, error } = await supabaseClient.auth.getSession();

      if (error || !data.session) {
        window.location.href = "login.html";
        return false;
      }

      return true;
    }

    function carregarCabecalho() {
      statusPrivado.innerHTML = `
        <strong>Você:</strong> ${escapeHtml(usuarioAtual)}<br>
        <strong>Conversando com:</strong> ${escapeHtml(outroUsuario)}<br>
        <strong>Sala:</strong> ${escapeHtml(salaId)}
      `;
    }

    async function carregarMensagensPrivadas() {
      const { data, error } = await supabaseClient
        .from("mensagens_privadas")
        .select("*")
        .eq("sala_id", salaId)
        .order("id", { ascending: true });

      if (error) {
        console.error(error);
        chatPrivadoMensagens.innerHTML = '<div class="vazio">Erro ao carregar mensagens privadas.</div>';
        return;
      }

      if (!data || !data.length) {
        chatPrivadoMensagens.innerHTML = '<div class="vazio">Nenhuma mensagem privada ainda.</div>';
        return;
      }

      let html = "";

      data.forEach(function(item) {
        const classe = item.de_nome && item.de_nome.toUpperCase() === usuarioAtual.toUpperCase() ? "eu" : "outro";

        html += `
          <div class="msg-item ${classe}">
            <div class="msg-topo">${escapeHtml(item.de_nome)}</div>
            <div class="msg-texto">${escapeHtml(item.mensagem)}</div>
            <div class="msg-data">${formatarData(item.criado_em)}</div>
          </div>
        `;
      });

      chatPrivadoMensagens.innerHTML = html;
      chatPrivadoMensagens.scrollTop = chatPrivadoMensagens.scrollHeight;
    }

    btnEnviarPrivado.addEventListener("click", async function() {
      const texto = textoPrivado.value.trim();

      if (!texto) {
        msgPrivado.textContent = "Digite uma mensagem privada.";
        return;
      }

      try {
        msgPrivado.textContent = "Enviando mensagem privada...";

        const { error } = await supabaseClient
          .from("mensagens_privadas")
          .insert([
            {
              sala_id: salaId,
              de_nome: usuarioAtual,
              para_nome: outroUsuario,
              mensagem: texto
            }
          ]);

        if (error) {
          throw error;
        }

        textoPrivado.value = "";
        msgPrivado.textContent = "Mensagem privada enviada com sucesso.";
        carregarMensagensPrivadas();
      } catch (erro) {
        console.error(erro);
        msgPrivado.textContent = "Erro ao enviar mensagem privada: " + erro.message;
      }
    });

    textoPrivado.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        btnEnviarPrivado.click();
      }
    });

    supabaseClient
      .channel("mensagens-privadas-realtime")
      .on(
        "postgres_changes",
        {
          event: "*",
          schema: "public",
          table: "mensagens_privadas"
        },
        function(payload) {
          if (payload.new && payload.new.sala_id === salaId) {
            carregarMensagensPrivadas();
          }
        }
      )
      .subscribe();

    verificarSessao().then(function(ok) {
      if (ok) {
        carregarCabecalho();
        carregarMensagensPrivadas();
      }
    });
  </script>
</body>
</html>
